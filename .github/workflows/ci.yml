name: CI

on:
  push:
  pull_request:

jobs:
  smoke-and-reporting:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies and package
        run: |
          python -m pip install --upgrade pip build
          pip install -r requirements.txt
          pip install pytest
          pip install .

      - name: Run unit tests
        run: |
          python -m pytest tests/ -q

      - name: Guard against withdrawn terminology in public artifacts
        run: |
          python - <<'PY'
          import re, sys, pathlib
          # v0.4 (framing F1) forbids these in public-facing text.
          forbidden = [
              r"natural drift", r"natural regime drift", r"genuinely drifted",
              r"calibrated uncertainty", r"calibrated predictive",
              r"hardware simulation",
          ]
          targets = ["manuscript/sn-article.tex", "README.md", "CITATION.cff"]
          bad = []
          for t in targets:
              text = pathlib.Path(t).read_text(encoding="utf-8")
              for pat in forbidden:
                  for m in re.finditer(pat, text):
                      # allow the word when explicitly quoting/renaming ("not X")
                      ctx = text[max(0, m.start()-40):m.start()].lower()
                      if "not " in ctx or "rather than" in ctx or "no longer" in ctx:
                          continue
                      bad.append(f"{t}: '{pat}'")
          if bad:
              print("Withdrawn terminology found:", *bad, sep="\n  ")
              sys.exit(1)
          print("terminology guard OK")
          PY

      - name: Run CLI smoke test
        run: |
          python scripts/smoke/smoke_test_cli.py

      - name: Verify smoke test report exists
        run: |
          test -f docs/smoke_test_report.json

      - name: Run reporting on versioned aggregates
        run: |
          python scripts/reporting/make_summary_tables.py \
            --metrics results/aggregated/AGG_ROOT_mean_std_metrics__by_variant_seed_and_size.csv \
            --drops results/aggregated/AGG_ROOT_mean_std_drop__by_variant_seed_and_size.csv \
            --outdir results/tables_ci \
            --topn 10 \
            --round 4

      - name: Verify expected reporting outputs exist
        run: |
          test -f results/tables_ci/table_18settings_best_ood__with_std.csv
          test -f results/tables_ci/table_18settings_best_id__with_std.csv
          test -f results/tables_ci/table_18settings_best_drop__with_std.csv
          test -f results/tables_ci/table_90cells_dimlevel_best_ood__with_std.csv
          test -f results/tables_ci/table_top10_cases_ood__with_std.csv